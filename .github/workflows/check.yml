name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Type check & build
        run: pnpm build

      - name: Test
        run: pnpm test

  backend:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            deps: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          - os: macos-latest
            deps: ''
          - os: windows-latest
            deps: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies
        if: matrix.deps != ''
        run: ${{ matrix.deps }}

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Test
        working-directory: src-tauri
        run: cargo test
